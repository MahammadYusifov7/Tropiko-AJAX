<section class="flex justify-between items-center mt-4 mb-4">
    <div class="container px-4 md:px-16 w-2/3">
        <h2 data-key="navContact" class="text-[32px] font-bold mb-4"></h2>
        <form class="flex flex-col gap-5">
            <input type="text" placeholder="Name" class="border-b outline-none w-full">
            <input type="number" placeholder="Phone Number" class="border-b outline-none w-full">
            <input type="email" placeholder="Email" class="border-b outline-none w-full">
            <input type="text" placeholder="Message" class="border-b outline-none w-full">
        </form>
        <button data-key="gonder"
            class="mt-5 bg-[#fc5d35] text-white w-32 h-12 text-[14px] cursor-pointer border-2 hover:bg-white hover:text-[#fc5d35]"></button>
    </div>
    <img class="overflow-hidden" src="img/orange-dish.png" alt="">
